version: "3.9"

services:
  db:
    image: postgres:14-alpine
    container_name: listmonk_db
    restart: always
    environment:
      - POSTGRES_USER=listmonk
      - POSTGRES_PASSWORD=listmonk
      - POSTGRES_DB=listmonk
    volumes:
      - listmonk_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk -d listmonk -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-init:
    image: listmonk/listmonk:latest
    container_name: listmonk_app_init
    depends_on:
      db:
        condition: service_healthy
    environment:
      - LISTMONK_db__host=db
      - LISTMONK_db__user=listmonk
      - LISTMONK_db__password=listmonk
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__port=5432
    volumes:
      - ./listmonk/config.toml:/listmonk/config.toml
    command: sh -c "cd /listmonk && echo 'y' | ./listmonk --install && sleep 2"

  app:
    image: listmonk/listmonk:latest
    container_name: listmonk_app
    restart: always
    ports:
      - "9000:9000"
    environment:
      - LISTMONK_db__host=db
      - LISTMONK_db__user=listmonk
      - LISTMONK_db__password=listmonk
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__port=5432
      - LISTMONK_app__address=0.0.0.0:9000
    volumes:
      - ./listmonk/config.toml:/listmonk/config.toml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health | grep -q 'true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      app-init:
        condition: service_completed_successfully

volumes:
  listmonk_data:
