{% extends "base.html" %}

{% block title %}Sign out — Crafted Edge Solutions{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card" style="text-align:center;">
    <div class="eyebrow" style="margin-bottom:16px">— Account</div>
    <h1 class="auth-title">Sign <em>out?</em></h1>
    <p style="color:var(--fg-mid); margin-bottom:32px;">You'll need to sign back in to access your Insights membership.</p>
    <form method="POST" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="form-submit" style="margin:0 auto;">Sign out <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7h9M8.5 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </form>
    <div style="margin-top:20px;"><a href="/" style="color:var(--fg-dim); font-size:0.875rem;">← Back to home</a></div>
  </div>
</section>
{% endblock %}
