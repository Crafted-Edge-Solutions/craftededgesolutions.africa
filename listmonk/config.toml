# listmonk configuration
# See https://listmonk.app/docs/configuration for more options

[app]
address = "0.0.0.0:9000"
admin_username = "admin"
admin_password = "password" # Change this on first login

[db]
host = "db"
port = 5432
user = "listmonk"
password = "listmonk"
database = "listmonk"
ssl_mode = "disable"
max_open_conns = 25
max_idle_conns = 25
conn_max_lifetime = "5m"
